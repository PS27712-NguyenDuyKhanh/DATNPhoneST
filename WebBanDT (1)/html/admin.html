<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="../css/admin/admin.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <script src="../js/admin/auth-check.js"></script>

    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <h2 class="logo">PhoneShop</h2>

            <ul>

                <li class="active">
                    <a href="/admin/admin.html">
                        <i class="fa fa-chart-line"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="acount.html">
                        <i class="fa fa-user"></i>
                        Quản lý tài khoản
                    </a>
                </li>

                <li>
                    <a href="product.html">
                        <i class="fa fa-mobile"></i>
                        Quản lý sản phẩm
                    </a>
                </li>

                <li>
                    <a href="order.html">
                        <i class="fa fa-box"></i>
                        Quản lý đơn hàng
                    </a>
                </li>

                <li>
                    <a href="categories.html">
                        <i class="fa fa-warehouse"></i>
                        Quản lý danh mục
                    </a>
                </li>

                <li>
                    <a href="coupon.html">
                        <i class="fa fa-ticket"></i>
                        Mã giảm giá
                    </a>
                </li>

                <li>
                    <a href="review.html">
                        <i class="fa-solid fa-star"></i>
                        Đánh giá
                    </a>
                </li>

            </ul>

            <button class="logout" id="btnLogout">
                <i class="fa fa-sign-out"></i>
                Đăng xuất
            </button>

        </div>


        <!-- MAIN -->
        <div class="main">

            <!-- TOPBAR -->
            <div class="topbar">

                <input type="text" placeholder="Tìm kiếm...">

                <div class="admin-user">
                    <i class="fa-solid fa-user"></i>
                    <span id="adminName">Admin</span>
                </div>

            </div>


            <!-- DASHBOARD CARDS -->
            <div class="cards">

                <div class="card revenue">

                    <div class="card-icon">
                        <i class="fa fa-dollar-sign"></i>
                    </div>

                    <div class="card-info">
                        <h3>Doanh thu</h3>
                        <p>120.000.000đ</p>
                    </div>

                </div>


                <div class="card orders">

                    <div class="card-icon">
                        <i class="fa fa-shopping-cart"></i>
                    </div>

                    <div class="card-info">
                        <h3>Đơn hàng</h3>
                        <p>350</p>
                    </div>

                </div>


                <div class="card products">

                    <div class="card-icon">
                        <i class="fa fa-mobile"></i>
                    </div>

                    <div class="card-info">
                        <h3>Sản phẩm</h3>
                        <p>120</p>
                    </div>

                </div>


                <div class="card users">

                    <div class="card-icon">
                        <i class="fa fa-users"></i>
                    </div>

                    <div class="card-info">
                        <h3>Khách hàng</h3>
                        <p>85</p>
                    </div>

                </div>

            </div>

            <div class="charts">

                <!-- BIỂU ĐỒ DOANH THU -->
                <div class="chart-box">

                    <h2>Biểu đồ doanh thu theo tháng</h2>

                    <canvas id="revenueChart"></canvas>

                </div>


                <!-- BIỂU ĐỒ SẢN PHẨM -->
                <div class="chart-box">

                    <h2>Thống kê sản phẩm theo hãng</h2>

                    <canvas id="productChart"></canvas>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/admin/admin.js"></script>

</body>

</html>
