<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>

    <link rel="stylesheet" href="../css/admin.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <h2 class="logo">PhoneShop</h2>

            <ul>

                <li class="active">
                    <a href="admin.html">
                        <i class="fa fa-chart-line"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="Acount.html">
                        <i class="fa fa-user"></i>
                        Quản lý tài khoản
                    </a>
                </li>

                <li>
                    <a href="product.html">
                        <i class="fa fa-mobile"></i>
                        Quản lý sản phẩm
                    </a>
                </li>

                <li>
                    <a href="order.html">
                        <i class="fa fa-box"></i>
                        Quản lý đơn hàng
                    </a>
                </li>

                <li>
                    <a href="inventory.html">
                        <i class="fa fa-warehouse"></i>
                        Quản lý danh mục
                    </a>
                </li>

                <li>
                    <a href="coupon.html">
                        <i class="fa fa-ticket"></i>
                        Mã giảm giá
                    </a>
                </li>

                <li>
                    <a href="review.html">
                        <i class="fa-solid fa-star"></i>
                        Đánh giá
                    </a>
                </li>

            </ul>

            <button class="logout">
                <i class="fa fa-sign-out"></i>
                Đăng xuất
            </button>

        </div>


        <!-- MAIN -->

        <div class="main">

            <!-- TOPBAR -->

            <div class="topbar">

                <h2 style="margin-bottom:20px;">Quản lý sản phẩm</h2>

                <div class="admin">
                    <img src="">
                    <span>Admin</span>
                </div>

            </div>


            <div class="toolbar">

                <button class="add-btn" onclick="goCreateProduct()">
                    <i class="fa fa-plus"></i>
                    Thêm sản phẩm
                </button>

            </div>

            <!-- TABLE -->

            <div class="table-box">

                <table>

                    <thead>

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Ảnh</th>
                                <th>SKU</th>
                                <th>Tên sản phẩm</th>
                                <th>Tồn kho</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>

                    </thead>

                    <tbody id="productTable"></tbody>

                </table>

            </div>

        </div>

    </div>

    <script>

        const API = "http://localhost:8081/api/admin/products";

        async function loadProducts() {

            const token = localStorage.getItem("token");

            try {

                const res = await fetch(API, {
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    }
                });

                if (!res.ok) {
                    console.error("API lỗi:", res.status);
                    return;
                }

                const data = await res.json();

                const table = document.getElementById("productTable");

                table.innerHTML = "";

                const products = data.content || data;

                products.forEach(p => {

                    const img = p.variants?.[0]?.images?.[0]?.imageUrl || "";

                    const stock = p.variants?.reduce((total, v) => total + (v.stock || 0), 0);

                    const status = stock > 0 ? "Đang bán" : "Hết hàng";

                    table.innerHTML += `
    <tr onclick="viewProduct(${p.id})" style="cursor:pointer">

        <td>${p.id}</td>

        <td>
            <img src="http://localhost:8081${img}" width="50">
        </td>

        <td>${p.sku || ""}</td>

        <td>${p.name}</td>

        <td>${stock}</td>

        <td>${status}</td>

        <td onclick="event.stopPropagation()">
            <button onclick="editProduct(${p.id})">Sửa</button>
            <button onclick="deleteProduct(${p.id})">Xóa</button>
        </td>

    </tr>
    `;
                });

            } catch (err) {
                console.error("Lỗi load sản phẩm:", err);
            }

        }


        function goCreateProduct() {

            window.location.href = "create-product.html";

        }

        function viewProduct(id) {

            window.location.href = "product-detail-admin.html?id=" + id;

        }

        function editProduct(id){

    window.location.href = "edit-product.html?id=" + id;

}


        async function deleteProduct(id) {

            const token = localStorage.getItem("token");

            if (!confirm("Xóa sản phẩm này?")) return;

            await fetch(API + "/" + id, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            loadProducts();
        }

        loadProducts();

    </script>

</body>

</html>
