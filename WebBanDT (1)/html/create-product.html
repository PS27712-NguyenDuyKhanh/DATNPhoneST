<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Thêm sản phẩm</title>

<link rel="stylesheet" href="../css/admin.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.variant-card{
border:1px solid #ddd;
padding:15px;
margin-top:10px;
border-radius:6px;
background:#fafafa;
}

.variant-header{
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.variant-body input{
display:block;
margin-bottom:8px;
width:100%;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2 class="logo">PhoneShop</h2>

<ul>

<li>
<a href="admin.html">
<i class="fa fa-chart-line"></i>
Dashboard
</a>
</li>

<li>
<a href="product.html">
<i class="fa fa-mobile"></i>
Quản lý sản phẩm
</a>
</li>

</ul>

</div>


<div class="main">

<div class="topbar">
<h2>Thêm sản phẩm</h2>
</div>


<div class="form-box">

<h3>Thông tin sản phẩm</h3>

<input id="name" placeholder="Tên sản phẩm">

<input id="sku" placeholder="SKU">

<input id="os" placeholder="Hệ điều hành">

<textarea id="description" placeholder="Mô tả"></textarea>

<select id="categoryId">
<option value="">-- Chọn danh mục --</option>
</select>


<h3>Cấu hình</h3>

<input id="cpu" placeholder="CPU">

<input id="ram" placeholder="RAM">

<input id="rom" placeholder="ROM">

<input id="gpu" placeholder="GPU">

<input id="camera" placeholder="Camera">

<input id="battery" placeholder="Pin">

<input id="screen" placeholder="Màn hình">


<h3>Thông tin màu sắc và giá sản phẩm</h3>

<div id="variantContainer"></div>

<button onclick="addVariant()">
+ Thêm màu sắc sản phẩm
</button>


<br><br>

<button onclick="createProduct()">Tạo sản phẩm</button>

</div>

</div>

</div>


<script>

const API="http://localhost:8081/api/admin/products";
const CATEGORY_API="http://localhost:8081/api/categories";

let variantIndex=0;


/* =====================
LOAD CATEGORY
===================== */

async function loadCategories(){

const res=await fetch(CATEGORY_API);

const data=await res.json();

const select=document.getElementById("categoryId");

data.forEach(c=>{

select.innerHTML+=`<option value="${c.id}">${c.name}</option>`;

});

}

loadCategories();


/* =====================
UPLOAD IMAGE
===================== */

async function uploadImage(file){

const formData=new FormData();

formData.append("file",file);

const token=localStorage.getItem("token");

const res=await fetch("http://localhost:8081/api/file/upload",{

method:"POST",

headers:{
"Authorization":"Bearer "+token
},

body:formData

});

return await res.text();

}


/* =====================
ADD VARIANT
===================== */

function addVariant(){

const container=document.getElementById("variantContainer");

/* thu variant cũ */

document.querySelectorAll(".variant-body").forEach(v=>{
v.style.display="none";
});

variantIndex++;

const html=`
<div class="variant-card">

<div class="variant-header" onclick="toggleVariant(${variantIndex})">
Biến thể ${variantIndex}
</div>

<div class="variant-body" id="variantBody${variantIndex}">

<input placeholder="Màu sắc" id="color${variantIndex}">

<input placeholder="Giá bán" id="price${variantIndex}">

<input placeholder="Giá khuyến mãi" id="salePrice${variantIndex}">

<input type="datetime-local" id="saleStart${variantIndex}">

<input type="datetime-local" id="saleEnd${variantIndex}">

<input placeholder="Tồn kho" id="stock${variantIndex}">

<input type="file" id="image${variantIndex}">

</div>

</div>
`;

container.insertAdjacentHTML("beforeend",html);

}


/* =====================
TOGGLE VARIANT
===================== */

function toggleVariant(index){

const body=document.getElementById("variantBody"+index);

if(body.style.display==="none"){

body.style.display="block";

}else{

body.style.display="none";

}

}


/* =====================
GET VARIANTS
===================== */

async function getVariants(){

let variants=[];

for(let i=1;i<=variantIndex;i++){

const color=document.getElementById("color"+i)?.value;

if(!color) continue;

const file=document.getElementById("image"+i)?.files[0];

let imageUrl="";

if(file){

imageUrl=await uploadImage(file);

}

variants.push({

color:color,

price:Number(document.getElementById("price"+i).value),

salePrice:Number(document.getElementById("salePrice"+i).value),

saleStart:document.getElementById("saleStart"+i).value,

saleEnd:document.getElementById("saleEnd"+i).value,

stock:Number(document.getElementById("stock"+i).value),

images:[
{
imageUrl:imageUrl
}
]

});

}

return variants;

}


/* =====================
CREATE PRODUCT
===================== */

async function createProduct(){

const token=localStorage.getItem("token");

const variants=await getVariants();

const data={

name:document.getElementById("name").value,

sku:document.getElementById("sku").value,

os:document.getElementById("os").value,

description:document.getElementById("description").value,

categoryId:Number(document.getElementById("categoryId").value),

specification:{

cpu:document.getElementById("cpu").value,

ram:document.getElementById("ram").value,

rom:document.getElementById("rom").value,

gpu:document.getElementById("gpu").value,

camera:document.getElementById("camera").value,

battery:document.getElementById("battery").value,

screen:document.getElementById("screen").value

},

variants:variants

};

await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify(data)

});

alert("Thêm sản phẩm thành công");

window.location.href="product.html";

}

</script>

</body>
</html>
