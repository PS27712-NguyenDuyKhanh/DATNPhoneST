<!DOCTYPE html>
<html>

<head>
    <title>Phone Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<a href="index.html">⬅ Back</a>

<div class="row mt-3">

    <div class="col-md-6">

        <img id="image" class="img-fluid">

        <div id="colors" class="mt-3"></div>

    </div>

    <div class="col-md-6">

        <h3 id="name"></h3>

        <h4 class="text-danger" id="price"></h4>

        <p id="description"></p>

    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadProduct(){

    const res = await fetch(`http://localhost:8081/api/products/${id}`);

    const p = await res.json();

    document.getElementById("name").innerText = p.name;
    document.getElementById("price").innerText = p.price + " đ";
    document.getElementById("description").innerText = p.description;

    if(p.images.length > 0){
        document.getElementById("image").src = p.images[0].imageUrl;
    }

    const colors = document.getElementById("colors");

    p.images.forEach(img => {

        colors.innerHTML += `
            <button class="btn btn-outline-dark me-2"
                onclick="changeImage('${img.imageUrl}')">
                ${img.color}
            </button>
        `;

    });

}

function changeImage(url){
    document.getElementById("image").src = url;
}

loadProduct();

</script>

</body>
</html>
